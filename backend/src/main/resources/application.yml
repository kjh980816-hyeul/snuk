spring:
  application:
    name: chzikon
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

server:
  port: 8080

# 도메인/앱 공통 (프로파일에서 override)
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:local-dev-only-secret-please-override-with-openssl-rand-base64-64-aaaaaaaaaaaa}
    access-token-validity-seconds: 1800        # 30분
    refresh-token-validity-seconds: 1209600     # 14일
  key-encryption:
    # 게임 키 AES-256 암호화 키 (base64 32바이트). prod는 반드시 env로 override.
    secret: ${KEY_ENCRYPTION_SECRET:bG9jYWwtZGV2LTMyYnl0ZS1rZXktMDAwMDAwMDAwMDA=}
  chzzk:
    client-id: ${CHZZK_CLIENT_ID:dummy-client-id}
    client-secret: ${CHZZK_CLIENT_SECRET:dummy-client-secret}
    redirect-uri: ${CHZZK_REDIRECT_URI:http://localhost:8080/login/oauth2/code/chzzk}
    authorization-uri: https://chzzk.naver.com/account-interlock
    token-uri: https://openapi.chzzk.naver.com/auth/v1/token
    api-base-uri: https://openapi.chzzk.naver.com
    follower-cache-seconds: 30
  cime:
    # 씨미(ci.me) OAuth — developers.ci.me 애플리케이션 발급 후 env 주입. 더미면 실연동 불가(부팅은 정상).
    client-id: ${CIME_CLIENT_ID:dummy-client-id}
    client-secret: ${CIME_CLIENT_SECRET:dummy-client-secret}
    redirect-uri: ${CIME_REDIRECT_URI:http://localhost:8080/login/oauth2/code/cime}
    authorization-uri: ${CIME_AUTH_URI:https://ci.me/auth/openapi/account-interlock}
    token-uri: ${CIME_TOKEN_URI:https://ci.me/api/openapi/auth/v1/token}
    api-base-uri: ${CIME_API_BASE_URI:https://ci.me}
    follower-cache-seconds: 30
  soop:
    # 숲(SOOP) Open API — 제휴 승인 후 '내 계정'에서 키 발급 + redirect 등록. 더미면 실연동 불가(부팅은 정상).
    client-id: ${SOOP_CLIENT_ID:dummy-client-id}
    client-secret: ${SOOP_CLIENT_SECRET:dummy-client-secret}
    redirect-uri: ${SOOP_REDIRECT_URI:http://localhost:8080/login/oauth2/code/soop}
    authorization-uri: ${SOOP_AUTH_URI:https://openapi.sooplive.com/auth/code}
    api-base-uri: ${SOOP_API_BASE_URI:https://openapi.sooplive.com}
  portone:
    # PortOne(V2) 결제. storeId/channelKey 는 공개값(프론트 결제창), api-secret 은 비밀값(서버 검증).
    # 실제 값은 PortOne 콘솔에서 발급 후 env 로 주입. 로컬 dummy 는 결제 미연동.
    store-id: ${PORTONE_STORE_ID:store-dummy}
    channel-key: ${PORTONE_CHANNEL_KEY:channel-dummy}
    api-secret: ${PORTONE_API_SECRET:dummy-portone-api-secret}
    api-base-uri: ${PORTONE_API_BASE_URI:https://api.portone.io}
  upload:
    # 프사 등 업로드 파일 저장 위치. 운영은 UPLOAD_DIR env 로 지정(웹서버 서빙 경로와 일치).
    dir: ${UPLOAD_DIR:uploads}
  frontend:
    # 로그인 콜백 후 리다이렉트할 프론트 주소
    redirect-base: ${FRONTEND_REDIRECT_BASE:http://localhost:5173}
  admin:
    # 이 치지직 채널ID로 로그인하면 ADMIN 으로 고정(대표 단일 ADMIN, ADM-01).
    # 운영 시 대표 채널ID를 env(CHZZK_ADMIN_CHANNEL_ID)로 지정.
    channel-id: ${CHZZK_ADMIN_CHANNEL_ID:}
