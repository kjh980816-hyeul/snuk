

<!-- ── 모바일 상단바 ── -->
<div class="mobile-topbar" id="mobile-topbar">
  <div class="mobile-logo">SNUK</div>
  <div class="mobile-topbar-right">
    <button class="mobile-login-btn" onclick="openLogin()">로그인</button>
    <div class="mobile-menu-btn" id="mobile-menu-btn" onclick="toggleMobileMenu()">
      <span></span><span></span><span></span>
    </div>
  </div>
</div>
<!-- 오버레이 -->
<div class="mobile-overlay" id="mobile-overlay" onclick="closeMobileMenu()"></div>
<!-- 드로어 -->
<div class="mobile-drawer" id="mobile-drawer">
  <div class="mobile-drawer-search">
    <input type="text" placeholder="검색..." onkeydown="if(event.key==='Enter'){closeMobileMenu();window.__snukSearch(this.value);this.value='';}">
  </div>
  <div class="rs-nav">
    <button class="rs-item" data-menu="HOME" onclick="__snukNav('/')">HOME</button>
    <button class="rs-item" data-menu="CAMPAIGNS" onclick="__snukNav('/campaigns')">컨텐츠·대회</button>
    <button class="rs-item" data-menu="GAMES" onclick="__snukNav('/games')">게임체험단</button>
    <button class="rs-item" data-menu="STREAMERS" onclick="__snukNav('/streamers')">스트리머</button>
    <button class="rs-item" data-menu="NEWS" onclick="__snukNav('/news')">스눅 뉴스</button>
    <button class="rs-item" data-menu="VIDEOS" onclick="__snukNav('/videos')">영상</button>
    <button class="rs-item" data-menu="GOODS" onclick="__snukNav('/goods')">굿즈샵</button>
    <button class="rs-item" data-menu="RESOURCES" onclick="__snukNav('/resources')">무료소스</button>
    <button class="rs-item" data-menu="CLIENTS" onclick="__snukNav('/clients')">협력사</button>
    <button class="rs-item rs-admin-item" style="display:none;color:#ffb300;" onclick="__snukNav('/admin')">관리자</button>
  </div>
</div>

<!-- ── RIGHT SIDEBAR ── -->
<aside class="rs" id="rs">
  <div class="rs-top">
    <div class="rs-top-row">
      <div class="rs-logo">SNUK</div>
      <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">라이트 모드</button>
    </div>
    <div class="rs-auth-btns" id="rs-auth-btns">
      <button class="rs-auth-btn" onclick="openSignup()">회원가입</button>
      <button class="rs-auth-btn primary" onclick="openLogin()">로그인</button>
    </div>
  </div>
  <!-- 로그인 후 프로필 -->
  <div class="rs-profile" id="rs-profile">
    <div class="rs-profile-inner" onclick="openMypage()">
      <div class="rs-avatar" id="rs-av">S</div>
      <div><div class="rs-uname" id="rs-uname">SNUK유저</div></div>
    </div>
    <button class="rs-mypage-btn" onclick="openMypage()">마이페이지</button>
    <button class="rs-mypage-btn" style="margin-top:6px;opacity:.75;" onclick="doLogout()">로그아웃</button>
  </div>

  <!-- 검색창 -->
  <div class="rs-search">
    <div class="rs-search-box">
      <span class="rs-search-icon">🔍</span>
      <input class="rs-search-input" type="text" placeholder="검색..."
        onkeydown="if(event.key==='Enter'){window.__snukSearch(this.value);this.value='';}">
    </div>
  </div>

  <div class="rs-nav">
    <button class="rs-item" data-menu="HOME" onclick="__snukNav('/')">HOME</button>
    <button class="rs-item" data-menu="CAMPAIGNS" onclick="__snukNav('/campaigns')">컨텐츠·대회</button>
    <button class="rs-item" data-menu="GAMES" onclick="__snukNav('/games')">게임체험단</button>
    <button class="rs-item" data-menu="STREAMERS" onclick="__snukNav('/streamers')">스트리머</button>
    <button class="rs-item" data-menu="NEWS" onclick="__snukNav('/news')">스눅 뉴스</button>
    <button class="rs-item" data-menu="VIDEOS" onclick="__snukNav('/videos')">영상</button>
    <button class="rs-item" data-menu="GOODS" onclick="__snukNav('/goods')">굿즈샵</button>
    <button class="rs-item" data-menu="RESOURCES" onclick="__snukNav('/resources')">무료소스</button>
    <button class="rs-item" data-menu="CLIENTS" onclick="__snukNav('/clients')">협력사</button>
    <button class="rs-item rs-admin-item" style="display:none;color:#ffb300;" onclick="__snukNav('/admin')">관리자</button>
  </div>

  <!-- 공지사항: 광고 바로 아래 고정 -->
  <div class="rs-notice">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <span class="rs-notice-title" style="margin-bottom:0;">공지사항</span>
      <span style="font-size:11px;color:var(--text2);cursor:pointer;font-weight:600;" onclick="showNoticeHome()">공지사항 홈 &rsaquo;</span>
    </div>
    <div id="rs-notice-list"></div>
  </div>

  <!-- 스포트라이트: 메인 배너 아래 섹션(#spotlight-section)으로 이동, 등록은 마이페이지 -->
</aside>
