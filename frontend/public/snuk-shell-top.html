

<!-- ── 모바일 상단바 ── -->
<div class="mobile-topbar" id="mobile-topbar">
  <div class="mobile-logo">SNUK</div>
  <div class="mobile-topbar-right">
    <button class="mobile-login-btn" onclick="openLogin()">로그인</button>
    <div class="mobile-menu-btn" id="mobile-menu-btn" onclick="toggleMobileMenu()">
      <span></span><span></span><span></span>
    </div>
  </div>
</div>
<!-- 오버레이 -->
<div class="mobile-overlay" id="mobile-overlay" onclick="closeMobileMenu()"></div>
<!-- 드로어 -->
<div class="mobile-drawer" id="mobile-drawer">
  <div class="mobile-drawer-search">
    <input type="text" placeholder="검색..." onkeydown="if(event.key==='Enter'){closeMobileMenu();window.__snukSearch(this.value);this.value='';}">
  </div>
  <div class="rs-nav">
    <button class="rs-item" onclick="__snukNav('/')">HOME</button>
    <button class="rs-item" onclick="__snukNav('/campaigns')">콘텐츠</button>
    <button class="rs-item" onclick="__snukNav('/games')">게임체험단</button>
    <button class="rs-item" onclick="__snukNav('/streamers')">스트리머</button>
    <button class="rs-item" onclick="__snukNav('/championship')">대회</button>
    <button class="rs-item" onclick="__snukNav('/live')">생방송</button>
    <button class="rs-item" onclick="__snukNav('/videos')">영상</button>
    <button class="rs-item" onclick="__snukNav('/goods')">굿즈샵</button>
    <button class="rs-item" onclick="__snukNav('/clients')">협력사</button>
    <button class="rs-item" onclick="__snukNav('/mypage')">마이페이지</button>
    <button class="rs-item rs-admin-item" style="display:none;color:#ffb300;" onclick="__snukNav('/admin')">관리자</button>
  </div>
</div>

<!-- ── RIGHT SIDEBAR ── -->
<aside class="rs" id="rs">
  <div class="rs-top">
    <div class="rs-top-row">
      <div class="rs-logo">SNUK</div>
      <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">라이트 모드</button>
    </div>
    <div class="rs-auth-btns" id="rs-auth-btns">
      <button class="rs-auth-btn" onclick="openSignup()">회원가입</button>
      <button class="rs-auth-btn primary" onclick="openLogin()">로그인</button>
    </div>
  </div>
  <!-- 로그인 후 프로필 -->
  <div class="rs-profile" id="rs-profile">
    <div class="rs-profile-inner" onclick="openMypage()">
      <div class="rs-avatar" id="rs-av">S</div>
      <div><div class="rs-uname" id="rs-uname">SNUK유저</div><div class="rs-usub">● 온라인</div></div>
    </div>
    <button class="rs-mypage-btn" onclick="openMypage()">마이페이지</button>
  </div>

  <!-- 검색창 -->
  <div class="rs-search">
    <div class="rs-search-box">
      <span class="rs-search-icon">🔍</span>
      <input class="rs-search-input" type="text" placeholder="검색..."
        onkeydown="if(event.key==='Enter'){window.__snukSearch(this.value);this.value='';}">
    </div>
  </div>

  <div class="rs-nav">
    <button class="rs-item" onclick="__snukNav('/')">HOME</button>
    <button class="rs-item" onclick="__snukNav('/campaigns')">콘텐츠</button>
    <button class="rs-item" onclick="__snukNav('/games')">게임체험단</button>
    <button class="rs-item" onclick="__snukNav('/streamers')">스트리머</button>
    <button class="rs-item" onclick="__snukNav('/championship')">대회</button>
    <button class="rs-item" onclick="__snukNav('/live')">생방송</button>
    <button class="rs-item" onclick="__snukNav('/videos')">영상</button>
    <button class="rs-item" onclick="__snukNav('/goods')">굿즈샵</button>
    <button class="rs-item" onclick="__snukNav('/clients')">협력사</button>
    <button class="rs-item" onclick="__snukNav('/mypage')">마이페이지</button>
    <button class="rs-item rs-admin-item" style="display:none;color:#ffb300;" onclick="__snukNav('/admin')">관리자</button>
  </div>

  <!-- 공지사항: 광고 바로 아래 고정 -->
  <div class="rs-notice">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <span class="rs-notice-title" style="margin-bottom:0;">공지사항</span>
      <span style="font-size:11px;color:var(--text2);cursor:pointer;font-weight:600;" onclick="showNoticeHome()">공지사항 홈 &rsaquo;</span>
    </div>
    <div id="rs-notice-list"></div>
  </div>

  <!-- 스포트라이트 -->
  <div class="rs-spotlight">
    <!-- 제목 -->
    <div style="display:flex;align-items:center;gap:5px;margin-bottom:6px;">
      <span class="rs-spotlight-title">스포트라이트</span>
      <span class="rs-spotlight-info" onclick="showToast('스포트라이트: 현재 방송 중인 채널을 홍보하세요')">ⓘ</span>
    </div>
    <!-- 신청하기 버튼 (제목 바로 아래) -->
    <button onclick="openSpotlight()" style="width:100%;padding:8px 0;border-radius:8px;
      background:#2a2a2e;color:#ffffff;border:none;cursor:pointer;
      font-family:'Pretendard','Noto Sans KR',sans-serif;font-size:12px;font-weight:700;
      margin-bottom:12px;transition:all .15s;letter-spacing:.3px;"
      onmouseover="this.style.background='#1a1a1e'" onmouseout="this.style.background='#2a2a2e'">
      내 방송 홍보하기 →
    </button>
    <div id="spotlight-list">
      <!-- 빈 상태 -->
      <div id="spotlight-empty" style="border:1px dashed var(--border2);border-radius:10px;padding:16px 12px;text-align:center;">
        <div style="font-size:12px;color:var(--text3);line-height:1.6;">이 시간 스포트라이트가 비어있어요!</div>
      </div>
      <!-- 1줄에 1개씩 2줄 (최대 2개 노출) -->
      <div id="spotlight-cards" style="display:flex;flex-direction:column;gap:8px;"></div>
    </div>
  </div>
</aside>
